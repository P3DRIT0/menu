<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview Mobile Menu QR Dinamico</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f3f3f3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .preview-shell {
            width: min(390px, 100vw);
            height: min(844px, 100vh);
            background: #111;
            border-radius: 28px;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .preview-frame {
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 20px;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="preview-shell">
        <iframe class="preview-frame" src="./preview.html" title="Preview movil de carta"></iframe>
    </div>
</body>
</html>
